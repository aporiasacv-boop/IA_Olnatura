<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Iniciar sesión — Olnatura</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="css/olnatura.css" rel="stylesheet">
</head>
<body class="login-page">
  <div class="container min-vh-100 d-flex align-items-center justify-content-center py-4">
    <div class="card olnatura-card shadow border-0 login-card">
      <div class="card-body p-4 p-md-5">
        <div class="text-center mb-4">
          <div class="olnatura-logo mx-auto mb-3">
            <i class="bi bi-flower1"></i>
          </div>
          <h1 class="h4 fw-semibold mb-1">Portal Empresarial Olnatura</h1>
          <p class="text-muted small mb-0">Inicia sesión para acceder al asistente</p>
        </div>

        <div id="login-error" class="alert alert-danger d-none" role="alert">
          <i class="bi bi-exclamation-triangle-fill me-2"></i>
          <span id="login-error-message"></span>
        </div>

        <form id="login-form" novalidate>
          <div class="mb-3">
            <label for="username" class="form-label fw-semibold">Usuario</label>
            <input type="text" class="form-control olnatura-input" id="username" name="username" autocomplete="username" required>
          </div>
          <div class="mb-4">
            <label for="password" class="form-label fw-semibold">Contraseña</label>
            <input type="password" class="form-control olnatura-input" id="password" name="password" autocomplete="current-password" required>
          </div>
          <button type="submit" id="login-button" class="btn btn-olnatura w-100 py-2">
            <i class="bi bi-box-arrow-in-right me-1"></i>
            Iniciar sesión
          </button>
        </form>
      </div>
    </div>
  </div>

  <script src="js/login.js"></script>
</body>
</html>
