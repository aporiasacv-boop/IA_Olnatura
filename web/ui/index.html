<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Asistente Empresarial — Olnatura</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="css/olnatura.css" rel="stylesheet">
</head>
<body>
  <header class="olnatura-header shadow-sm">
    <div class="container py-3 d-flex align-items-center justify-content-between">
      <div class="d-flex align-items-center gap-3">
        <div class="olnatura-logo" aria-hidden="true">
          <i class="bi bi-flower1"></i>
        </div>
        <div>
          <h1 class="h4 mb-0 text-white fw-semibold">Asistente Empresarial Olnatura</h1>
          <p class="mb-0 text-white-50 small">Inteligencia analítica y documental unificada</p>
        </div>
      </div>
      <span class="badge olnatura-badge-live d-none d-md-inline-flex align-items-center gap-1">
        <span class="pulse-dot"></span>
        Conectado a API
      </span>
    </div>
  </header>

  <main class="container py-4">
    <div class="row g-4">
      <div class="col-lg-8">
        <section class="card olnatura-card shadow-sm border-0">
          <div class="card-body p-4">
            <label for="question-input" class="form-label fw-semibold">
              <i class="bi bi-chat-left-text me-1"></i>
              Tu pregunta
            </label>
            <textarea
              id="question-input"
              class="form-control olnatura-input"
              rows="4"
              placeholder="Ejemplo: ¿Cuántos clientes tenemos y cómo se registran?"
              maxlength="2000"
            ></textarea>
            <div class="d-flex flex-wrap align-items-center justify-content-between gap-2 mt-3">
              <small class="text-muted" id="char-count">0 / 2000</small>
              <button type="button" id="ask-button" class="btn btn-olnatura px-4">
                <i class="bi bi-send me-1"></i>
                Consultar
              </button>
            </div>
          </div>
        </section>

        <section id="error-alert" class="alert alert-danger d-none mt-3" role="alert">
          <i class="bi bi-exclamation-triangle-fill me-2"></i>
          <span id="error-message"></span>
        </section>

        <section id="loading-state" class="card olnatura-card shadow-sm border-0 mt-3 d-none">
          <div class="card-body p-4 text-center text-muted">
            <div class="spinner-border text-olnatura mb-2" role="status" aria-hidden="true"></div>
            <p class="mb-0">Consultando al asistente...</p>
          </div>
        </section>

        <section id="response-section" class="card olnatura-card shadow-sm border-0 mt-3 d-none">
          <div class="card-header bg-white border-0 pt-4 px-4 pb-0">
            <div class="d-flex flex-wrap align-items-center justify-content-between gap-2">
              <h2 class="h5 mb-0 fw-semibold">
                <i class="bi bi-stars me-1 text-olnatura"></i>
                Respuesta
              </h2>
              <div class="d-flex flex-wrap gap-2">
                <span id="source-badge" class="badge rounded-pill"></span>
                <span id="time-badge" class="badge rounded-pill bg-light text-dark border">
                  <i class="bi bi-stopwatch me-1"></i>
                  <span id="response-time">—</span>
                </span>
              </div>
            </div>
          </div>
          <div class="card-body p-4">
            <p id="answer-text" class="mb-0 lh-lg"></p>
          </div>
        </section>
      </div>

      <div class="col-lg-4">
        <section class="card olnatura-card shadow-sm border-0 h-100">
          <div class="card-header bg-white border-0 pt-4 px-4 pb-2 d-flex align-items-center justify-content-between">
            <h2 class="h6 mb-0 fw-semibold">
              <i class="bi bi-clock-history me-1"></i>
              Historial local
            </h2>
            <button type="button" id="clear-history-button" class="btn btn-sm btn-outline-secondary" title="Limpiar historial">
              <i class="bi bi-trash3"></i>
            </button>
          </div>
          <div class="card-body px-4 pb-4 pt-2">
            <p id="history-empty" class="text-muted small mb-0">Aún no hay consultas en esta sesión.</p>
            <ul id="history-list" class="list-unstyled mb-0 olnatura-history"></ul>
          </div>
        </section>
      </div>
    </div>
  </main>

  <footer class="container pb-4">
    <p class="text-center text-muted small mb-0">
      Olnatura &mdash; Portal MVP &mdash; Datos desde Dynamics 365 y documentos corporativos
    </p>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
  <script src="js/app.js"></script>
</body>
</html>
